apiVersion: v2
name: gateway
description: The governance layer for AI agents — a single compiled Rust binary that authenticates, authorises, rate-limits, logs, and costs every AI interaction. Self-hosted, air-gap capable, provider-agnostic.
type: application
version: 0.1.0
appVersion: "0.3.0"
kubeVersion: ">=1.24.0"
home: https://systemprompt.io
icon: https://systemprompt.io/files/images/logo.svg
sources:
  - https://github.com/systempromptio/systemprompt-template
  - https://github.com/systempromptio/systemprompt-core
  - https://github.com/systempromptio/charts
maintainers:
  - name: systemprompt.io
    email: support@systemprompt.io
    url: https://systemprompt.io
keywords:
  - ai-governance
  - llm-gateway
  - mcp
  - claude
  - anthropic
  - openai
  - gemini
  - self-hosted
  - rust
  - audit
  - policy
  - rate-limiting
  - air-gap
