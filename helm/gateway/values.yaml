# Default single-replica values for systemprompt gateway.
# See values-ha.yaml for a 3-replica + external-Postgres example.

image:
  repository: ghcr.io/systempromptio/systemprompt-template
  tag: ""         # defaults to Chart.appVersion
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 2Gi

# AI provider keys. Create a Secret in advance and reference it here,
# or let the chart create one from the values below (NOT recommended in prod).
secrets:
  existingSecret: ""   # if set, ignores the keys below
  anthropicApiKey: ""
  openaiApiKey: ""
  geminiApiKey: ""

# Bitnami PostgreSQL subchart. Set enabled=false and configure externalDatabase
# to use an existing Postgres.
postgresql:
  enabled: true
  auth:
    username: systemprompt
    password: ""       # auto-generated if empty
    database: systemprompt
  primary:
    persistence:
      size: 10Gi

externalDatabase:
  url: ""   # e.g. postgres://user:pw@host:5432/dbname — required when postgresql.enabled=false

env: []     # additional env vars: { name: FOO, value: bar }

podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

healthcheck:
  path: /api/v1/health
  initialDelaySeconds: 30
  periodSeconds: 30
