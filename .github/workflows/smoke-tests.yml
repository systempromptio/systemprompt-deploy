name: Smoke tests (post-publish)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to smoke-test"
        required: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - id: t
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  docker-hub:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - run: |
          docker pull systemprompt/gateway:${{ needs.version.outputs.version }}
          docker run --rm systemprompt/gateway:${{ needs.version.outputs.version }} --version

  ghcr:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - run: |
          docker pull ghcr.io/systempromptio/systemprompt-template:${{ needs.version.outputs.version }}
          docker run --rm ghcr.io/systempromptio/systemprompt-template:${{ needs.version.outputs.version }} --version

  binary:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash scripts/install.sh --version ${{ needs.version.outputs.tag }} --prefix "$HOME/.local"
          "$HOME/.local/bin/systemprompt" --version

  homebrew:
    needs: version
    runs-on: macos-14
    steps:
      - run: |
          brew tap systempromptio/tap
          brew install gateway
          systemprompt --version

  scoop:
    needs: version
    runs-on: windows-latest
    steps:
      - shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          iwr -useb get.scoop.sh | iex
          scoop bucket add systemprompt https://github.com/systempromptio/scoop-bucket
          scoop install gateway
          systemprompt --version

  helm:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-helm@v4
      - uses: helm/kind-action@v1.10.0
      - run: |
          helm repo add systemprompt https://charts.systemprompt.io
          helm repo update
          helm install gateway systemprompt/gateway \
            --version ${{ needs.version.outputs.version }} \
            --set postgresql.auth.password=testpw \
            --set secrets.anthropicApiKey=dummy \
            --wait --timeout 300s
          kubectl wait --for=condition=Available deployment/gateway-gateway --timeout=180s

  apt:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        image: ["debian:bookworm", "ubuntu:22.04", "ubuntu:24.04"]
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      - run: |
          apt-get update && apt-get install -y curl gnupg ca-certificates
          curl -fsSL https://deb.systemprompt.io/gpg.key | gpg --dearmor -o /usr/share/keyrings/systemprompt.gpg
          echo "deb [signed-by=/usr/share/keyrings/systemprompt.gpg] https://deb.systemprompt.io stable main" \
            > /etc/apt/sources.list.d/systemprompt.list
          apt-get update && apt-get install -y systemprompt
          systemprompt --version

  rpm:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        image: ["rockylinux:9", "fedora:40"]
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    steps:
      - run: |
          curl -fsSL -o /etc/yum.repos.d/systemprompt.repo https://rpm.systemprompt.io/systemprompt.repo
          rpm --import https://rpm.systemprompt.io/gpg.key
          dnf install -y systemprompt
          systemprompt --version

  nix:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix run github:systempromptio/systemprompt-template/${{ needs.version.outputs.tag }} -- --version
