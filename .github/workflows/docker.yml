name: Docker — build, push, sign

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.2)"
        required: true

permissions:
  contents: read
  id-token: write     # cosign keyless
  packages: write     # GHCR

jobs:
  build:
    name: Build + push multi-arch
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/systemprompt/gateway:${{ steps.ver.outputs.version }}
            docker.io/systemprompt/gateway:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            docker.io/systemprompt/gateway:${{ steps.ver.outputs.major }}
            docker.io/systemprompt/gateway:latest
            ghcr.io/systempromptio/systemprompt-template:${{ steps.ver.outputs.version }}
            ghcr.io/systempromptio/systemprompt-template:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            ghcr.io/systempromptio/systemprompt-template:${{ steps.ver.outputs.major }}
            ghcr.io/systempromptio/systemprompt-template:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign images (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for ref in \
            docker.io/systemprompt/gateway \
            ghcr.io/systempromptio/systemprompt-template; do
            cosign sign --yes "${ref}@${DIGEST}"
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/systempromptio/systemprompt-template@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for ref in \
            docker.io/systemprompt/gateway \
            ghcr.io/systempromptio/systemprompt-template; do
            cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${ref}@${DIGEST}"
          done

      - name: Sync Docker Hub description
        if: ${{ !github.event.inputs.tag }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: systemprompt/gateway
          short-description: "AI governance gateway for Claude, OpenAI, and Gemini"
          readme-filepath: ./docs/install/docker.md
