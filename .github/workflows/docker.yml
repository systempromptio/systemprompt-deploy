name: Docker — build, push, sign

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.2)"
        required: true

permissions:
  contents: read
  id-token: write     # cosign keyless
  packages: write     # GHCR

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      major:   ${{ steps.ver.outputs.major }}
      minor:   ${{ steps.ver.outputs.minor }}
    steps:
      - id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # GHCR — always runs. No external secrets required (uses GITHUB_TOKEN).
  # This is the primary public image surface until we have a Docker Hub org.
  # ---------------------------------------------------------------------------
  ghcr:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Cross-repo push: publish to ghcr.io/systempromptio/systemprompt-template
      # from this private systemprompt-deploy repo. The default GITHUB_TOKEN only
      # has write access to packages matching this repo's name — so we need a PAT
      # with `write:packages` scope on the systempromptio org.
      - name: Log in to GHCR (cross-repo PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/systempromptio/systemprompt-template:${{ needs.version.outputs.version }}
            ghcr.io/systempromptio/systemprompt-template:${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}
            ghcr.io/systempromptio/systemprompt-template:${{ needs.version.outputs.major }}
            ghcr.io/systempromptio/systemprompt-template:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/systempromptio/systemprompt-template@${DIGEST}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/systempromptio/systemprompt-template@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "ghcr.io/systempromptio/systemprompt-template@${DIGEST}"

  # ---------------------------------------------------------------------------
  # Docker Hub — only runs when DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets
  # exist. Skipped cleanly otherwise (no false-red CI). Enable by subscribing
  # to the Docker Hub Team plan, creating the `systemprompt` org, generating
  # a PAT, and adding both secrets to the repo.
  # ---------------------------------------------------------------------------
  dockerhub:
    needs: version
    runs-on: ubuntu-latest
    if: ${{ vars.DOCKERHUB_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/systemprompt/gateway:${{ needs.version.outputs.version }}
            docker.io/systemprompt/gateway:${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}
            docker.io/systemprompt/gateway:${{ needs.version.outputs.major }}
            docker.io/systemprompt/gateway:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "docker.io/systemprompt/gateway@${DIGEST}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: docker.io/systemprompt/gateway@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "docker.io/systemprompt/gateway@${DIGEST}"

      - name: Sync Docker Hub description
        if: ${{ !github.event.inputs.tag }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: systemprompt/gateway
          short-description: "AI governance gateway for Claude, OpenAI, and Gemini"
          readme-filepath: ./docs/install/docker.md
