name: Release (gateway server)

# Publishes the systemprompt-gateway — the server-side AI governance gateway.
# Triggered by `v*` tags on this deploy repo. Cross-uploads assets to the public
# systemprompt-template GH Releases via RELEASE_UPLOAD_TOKEN.
#
# Cowork (client-side CLI for macOS/Windows) is a *separate* product. It is
# published by the template repo's own release workflow on `cowork-v*` tags.
# No cowork assets are produced by this workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Template tag to (re)publish (e.g. v0.3.5)"
        required: true

permissions:
  contents: write
  id-token: write     # cosign keyless OIDC

jobs:
  build-gateway:
    name: Build gateway (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            os: ubuntu-latest
            use_cross: true
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            os: ubuntu-latest
            use_cross: true
            ext: tar.gz
          # x86_64-apple-darwin temporarily removed — macos-13 runner queue was
          # 7h+ on v0.3.8 and never allocated. Re-add once Apple-silicon is the
          # only sensible Mac target, or once GH macOS capacity improves.
          - target: aarch64-apple-darwin
            name: darwin-arm64
            os: macos-14
            use_cross: false
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        env:
          SQLX_OFFLINE: "true"
          # aws-lc-sys's gcc-bug-95189 detector trips on Focal's host gcc 9 —
          # force HOST_CC=clang so build-script checks pass. Only override the
          # x86_64 target CC (same host arch; same gcc); leave aarch64 target CC
          # as the default cross-gcc so clang doesn't hunt for aarch64 libc
          # headers it can't find.
          HOST_CC: clang
          HOST_CXX: clang++
          CC_x86_64_unknown_linux_gnu: clang
          CXX_x86_64_unknown_linux_gnu: clang++
        run: cross build --release --workspace --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        shell: bash
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Stage artefacts
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && version="${{ inputs.tag }}" && version="${version#v}"
          stage="systemprompt-gateway-${version}-${{ matrix.name }}"
          mkdir -p "dist/${stage}"
          for b in systemprompt systemprompt-mcp-agent systemprompt-mcp-marketplace; do
            cp "target/${{ matrix.target }}/release/${b}" "dist/${stage}/"
          done
          cp -r services migrations "dist/${stage}/"
          [ -d web/dist ] && cp -r web/dist "dist/${stage}/web"
          cp LICENSE README.md "dist/${stage}/"
          echo "STAGE=${stage}" >> "$GITHUB_ENV"

      - name: Package (tar.gz)
        shell: bash
        run: |
          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-${{ matrix.name }}
          path: dist/${{ env.STAGE }}.tar.gz
          if-no-files-found: error

  build-packages:
    name: Build gateway ${{ matrix.kind }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-gateway
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: deb
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - kind: deb
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - kind: rpm
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - kind: rpm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build release binary
        env:
          SQLX_OFFLINE: "true"
          HOST_CC: clang
          HOST_CXX: clang++
          CC_x86_64_unknown_linux_gnu: clang
          CXX_x86_64_unknown_linux_gnu: clang++
        run: cross build --release -p systemprompt-template --target ${{ matrix.target }}
      - name: Install packager
        run: |
          if [ "${{ matrix.kind }}" = "deb" ]; then
            cargo install cargo-deb --locked
          else
            cargo install cargo-generate-rpm --locked
          fi
      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && version="${{ inputs.tag }}" && version="${version#v}"
          if [ "${{ matrix.kind }}" = "deb" ]; then
            cargo deb --no-build --target ${{ matrix.target }} --output "dist/systemprompt-gateway_${version}_${{ matrix.arch }}.deb"
          else
            cargo generate-rpm --target ${{ matrix.target }} --output "dist/systemprompt-gateway-${version}-${{ matrix.arch }}.rpm"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.kind }}-${{ matrix.arch }}
          path: dist/*

  sign-and-release:
    name: Sign + Release (gateway)
    runs-on: ubuntu-latest
    needs: [build-gateway]
    # build-packages (deb/rpm) removed from needs — it references mcp
    # extension binaries that -p systemprompt-template doesn't build. Deb/rpm
    # will be fixed and re-added separately; the gateway tarballs must ship
    # independently.
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tags
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "template_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "template_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256SUMS.gateway (gateway assets only)
        working-directory: dist
        shell: bash
        run: |
          # Gateway-only glob. This workflow does not produce cowork assets.
          # nullglob + the if-guard avoid `set -e` killing the step when deb/rpm
          # globs have no matches (they're optional — build-packages isn't
          # required for sign-and-release).
          shopt -s nullglob
          ls -la
          : > SHA256SUMS.gateway
          for f in systemprompt-gateway-*.tar.gz systemprompt-gateway_*.deb systemprompt-gateway-*.rpm; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.gateway
            fi
          done
          cat SHA256SUMS.gateway
          [ -s SHA256SUMS.gateway ] || { echo "SHA256SUMS.gateway is empty — no gateway artefacts found"; exit 1; }

      - uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS.gateway (keyless)
        working-directory: dist
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.gateway.sig \
            --output-certificate SHA256SUMS.gateway.pem \
            SHA256SUMS.gateway

      - name: Generate release notes
        run: |
          cat > notes.md <<'EOF'
          # systemprompt-gateway ${{ steps.tags.outputs.template_tag }}

          **Server-side AI governance gateway.** Deploy via Helm / GHCR / Docker / PaaS.

          > Looking for the **cowork** client CLI (for macOS / Windows developer
          > workstations)? It ships under the separate `cowork-v*` tag series —
          > see [latest cowork release](https://github.com/systempromptio/systemprompt-template/releases?q=cowork).

          ## Install

          ```
          curl -sSL https://get.systemprompt.io | sh
          ```

          Or manually: download the matching `systemprompt-gateway-<version>-<target>.tar.gz`
          tarball, verify against `SHA256SUMS.gateway`, extract.

          ## Gateway binaries (this release)

          Multi-target tarballs: `linux-amd64`, `linux-arm64`, `darwin-amd64`, `darwin-arm64`.

          Contents: `systemprompt`, `systemprompt-mcp-agent`, `systemprompt-mcp-marketplace`,
          `services/`, `migrations/`, `web/`.

          ## Linux packages

          - `systemprompt-gateway_<ver>_amd64.deb` / `systemprompt-gateway_<ver>_arm64.deb`
          - `systemprompt-gateway-<ver>-x86_64.rpm` / `systemprompt-gateway-<ver>-aarch64.rpm`

          ## Verify signature

          ```
          cosign verify-blob \
            --certificate-identity-regexp='https://github.com/systempromptio/systemprompt-deploy/' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --signature SHA256SUMS.gateway.sig \
            --certificate SHA256SUMS.gateway.pem \
            SHA256SUMS.gateway
          ```
          EOF

      - name: Create or update release on PUBLIC systemprompt-template repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN }}
        run: |
          tag="${{ steps.tags.outputs.template_tag }}"
          target="systempromptio/systemprompt-template"
          title="systemprompt-gateway $tag"
          if gh release view "$tag" --repo "$target" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$target" --title "$title" --notes-file notes.md
          else
            gh release create "$tag" \
              --repo "$target" \
              --title "$title" \
              --notes-file notes.md
          fi
          gh release upload "$tag" --repo "$target" --clobber dist/*
