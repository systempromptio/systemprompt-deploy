name: Winget — submit manifest PR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.2)"
        required: true

jobs:
  submit:
    runs-on: windows-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: systemprompt.gateway
          installers-regex: 'systemprompt-.*-windows-amd64\.zip$'
          release-tag: ${{ inputs.tag || github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}
