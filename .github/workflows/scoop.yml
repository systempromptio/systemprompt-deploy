name: Scoop — update bucket manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.2)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: systempromptio/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          path: bucket

      - name: Resolve version
        id: ver
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of Windows asset
        id: sha
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          version="${{ steps.ver.outputs.version }}"
          url="https://github.com/systempromptio/systemprompt-template/releases/download/${tag}/systemprompt-${version}-windows-amd64.zip"
          curl -fsSL "$url" -o pkg.zip
          echo "sha=$(sha256sum pkg.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Write manifest
        run: |
          cat > bucket/bucket/gateway.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "description": "AI governance gateway for Claude, OpenAI, and Gemini",
            "homepage": "https://systemprompt.io",
            "license": "MIT AND BUSL-1.1",
            "architecture": {
              "64bit": {
                "url": "${{ steps.sha.outputs.url }}",
                "hash": "${{ steps.sha.outputs.sha }}",
                "extract_dir": "systemprompt-${{ steps.ver.outputs.version }}-windows-amd64"
              }
            },
            "bin": [
              "systemprompt.exe",
              "systemprompt-mcp-agent.exe",
              "systemprompt-mcp-marketplace.exe"
            ],
            "checkver": "github",
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/systempromptio/systemprompt-template/releases/download/v\$version/systemprompt-\$version-windows-amd64.zip"
                }
              }
            }
          }
          EOF

      - name: Commit and push
        working-directory: bucket
        run: |
          git config user.name  "systemprompt-bot"
          git config user.email "bot@systemprompt.io"
          git add bucket/gateway.json
          git commit -m "gateway: update to ${{ steps.ver.outputs.version }}"
          git push
